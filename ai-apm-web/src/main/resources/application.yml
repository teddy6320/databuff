server:
  port: ${SERVER_PORT:27403}
  compression:
    enabled: true
    mime-types: application/javascript,application/json,application/xml,text/html,text/xml,text/plain,text/css,image/svg+xml
    min-response-size: 1024

spring:
  application:
    name: ai-apm-web
  web:
    resources:
      cache:
        cachecontrol:
          max-age: 365d
          cache-public: true

management:
  endpoints:
    web:
      exposure:
        include: health,info

apm:
  cluster:
    enabled: false
    node-id: web-1
    zookeeper:
      connect-string: ${APM_CLUSTER_ZOOKEEPER_CONNECT_STRING:${ZK_CONNECT_STRING:}}
  # node.worker-id: 1  # optional snowflake worker id (0-1023); defaults to hostname hash
  doris:
    fe-host: ${DORIS_FE_HOST:127.0.0.1}
    fe-query-port: ${DORIS_FE_QUERY_PORT:9030}
    fe-http-port: ${DORIS_FE_HTTP_PORT:8030}
    config-database: databuff
    metric-database: databuff
    trace-database: databuff
    username: ${DORIS_USER:root}
    password: ${DORIS_PASSWORD:}
  security:
    seed-username: admin
    seed-password: Databuff@123
    jwt:
      secret: dev-secret
      expiration-seconds: 3600
  alarm:
    lookback-minutes: 5
    evaluation-cron: "0 * * * * ?"
  monitor:
    pool:
      core-size: 4
      max-size: 16
      queue-size: 100
  ai:
    lookback-minutes: 15
  agent:
    agentscope-enabled: ${APM_AGENT_AGENTSCOPE_ENABLED:true}
    builtin-skills-dir: ${APM_BUILTIN_SKILLS_DIR:../deploy/common/skills}
    custom-skills-dir: ${APM_CUSTOM_SKILLS_DIR:./data/skills}
    workspace-dir: ${APM_DATA_DIR:./data}/ai-workspaces
    workspace-shell-commands: cat,head,tail,grep,wc,ls,file,python3
    workspace-shell-timeout-seconds: 60
    brain-agent-name: brain
    data-agent-name: data
    inspection-agent-name: inspection
