# DataBuff APM · OTLP demo seeder
# Usage: INGEST_HOST=192.168.1.10 ./start.sh

services:
  ai-apm-demo:
    image: ${APM_DEMO_IMAGE}
    container_name: ai-apm-demo
    hostname: ai-apm-demo
    restart: unless-stopped
    mem_limit: 256m
    environment:
      TZ: Asia/Shanghai
      JAVA_TOOL_OPTIONS: -Xms64m -Xmx128m -Duser.timezone=Asia/Shanghai
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-http://127.0.0.1:4318}
      SEED_INTERVAL_SECONDS: ${SEED_INTERVAL_SECONDS:-30}
