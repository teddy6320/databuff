# DataBuff APM 本地开发 — Doris + ingest/web/demo（JAR 目录挂载，改 jar 后 restart 即可）
# 启动: ./start.sh  |  停止: ./stop.sh  |  Doris 重装: ./install.sh

services:
  ai-apm-doris-fe:
    image: ${DORIS_FE_IMAGE:-apache/doris:fe-4.1.1}
    container_name: ai-apm-doris-fe
    hostname: ai-apm-doris-fe
    restart: unless-stopped
    cpus: 1
    # Doris FE 除 JVM 外还有较多堆外内存，不能与应用 JAR 服务共用 300M 上限
    mem_limit: 768m
    working_dir: /opt/apache-doris
    environment:
      FE_SERVERS: fe1:172.20.80.2:9010
      FE_ID: "1"
    entrypoint: ["/bin/bash", "-ec"]
    command:
      - |
        sed -i 's/-Xmx8192m/-Xmx512m/g' /opt/apache-doris/fe/conf/fe.conf
        sed -i 's/-Xms8192m/-Xms512m/g' /opt/apache-doris/fe/conf/fe.conf
        exec bash init_fe.sh
    volumes:
      - ./data/fe-meta:/opt/apache-doris/fe/doris-meta
    ports:
      - "8030:8030"
      - "9030:9030"
    networks:
      apm:
        ipv4_address: 172.20.80.2
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'exec 3<>/dev/tcp/127.0.0.1/9030' && curl -sf http://127.0.0.1:8030/api/bootstrap"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 120s

  ai-apm-doris-be:
    image: ${DORIS_BE_IMAGE:-apache/doris:be-4.1.1}
    container_name: ai-apm-doris-be
    hostname: ai-apm-doris-be
    restart: unless-stopped
    cpus: 1
    # BE 默认 -Xmx2048m，必须 patch；本地建议 3G（含 C++ 引擎与缓存）
    mem_limit: 3072m
    working_dir: /opt/apache-doris
    environment:
      FE_SERVERS: fe1:172.20.80.2:9010
      BE_ADDR: 172.20.80.5:9050
    entrypoint: ["/bin/bash", "-ec"]
    command:
      - |
        sed -i 's/-Xmx2048m/-Xmx512m/g' /opt/apache-doris/be/conf/be.conf
        exec bash entry_point.sh
    depends_on:
      ai-apm-doris-fe:
        condition: service_healthy
    volumes:
      - ./data/be-storage:/opt/apache-doris/be/storage
    ports:
      - "8040:8040"
    networks:
      apm:
        ipv4_address: 172.20.80.5
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://127.0.0.1:8040/api/health"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 120s

  ai-apm-ingest:
    image: ${OPENJDK_IMAGE}
    container_name: ai-apm-ingest
    hostname: ai-apm-ingest
    restart: unless-stopped
    cpus: 1
    mem_limit: 384m
    working_dir: /app
    entrypoint: ["/bin/sh", "/app/start.sh"]
    environment:
      TZ: Asia/Shanghai
      JAVA_TOOL_OPTIONS: -Xms128m -Xmx300m -Duser.timezone=Asia/Shanghai
      DORIS_FE_HOST: ai-apm-doris-fe
      DORIS_BE_HTTP_HOST: ai-apm-doris-be
    volumes:
      - ./run/ingest:/app
    ports:
      - "4317:4317"
      - "4318:4318"
    depends_on:
      ai-apm-doris-fe:
        condition: service_healthy
      ai-apm-doris-be:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'exec 3<>/dev/tcp/127.0.0.1/4318'"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 60s
    networks:
      apm:
        ipv4_address: 172.20.80.3

  ai-apm-web:
    image: ${OPENJDK_IMAGE}
    container_name: ai-apm-web
    hostname: ai-apm-web
    restart: unless-stopped
    cpus: 1
    mem_limit: 384m
    working_dir: /app
    entrypoint: ["/bin/sh", "/app/start.sh"]
    environment:
      TZ: Asia/Shanghai
      JAVA_TOOL_OPTIONS: -Xms128m -Xmx300m -Duser.timezone=Asia/Shanghai
      DORIS_FE_HOST: ai-apm-doris-fe
    volumes:
      - ./run/web:/app
      - ../common/skills:/app/skills:ro
      - ../../ai-apm-web/data:/app/data
    ports:
      - "27403:27403"
    depends_on:
      ai-apm-doris-fe:
        condition: service_healthy
      ai-apm-doris-be:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'exec 3<>/dev/tcp/127.0.0.1/27403'"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 90s
    networks:
      apm:
        ipv4_address: 172.20.80.4

  ai-apm-demo:
    image: ${OPENJDK_IMAGE}
    container_name: ai-apm-demo
    hostname: ai-apm-demo
    restart: unless-stopped
    mem_limit: 256m
    working_dir: /app
    entrypoint: ["/bin/sh", "/app/start.sh"]
    environment:
      TZ: Asia/Shanghai
      JAVA_TOOL_OPTIONS: -Xms64m -Xmx128m -Duser.timezone=Asia/Shanghai
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-http://ai-apm-ingest:4318}
      SEED_INTERVAL_SECONDS: ${SEED_INTERVAL_SECONDS:-30}
      JVM_METRIC_INTERVAL_SECONDS: ${JVM_METRIC_INTERVAL_SECONDS:-60}
    volumes:
      - ./run/demo:/app
    depends_on:
      ai-apm-ingest:
        condition: service_healthy
    networks:
      apm:
        ipv4_address: 172.20.80.6

networks:
  apm:
    name: databuff-ai-apm-local
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.80.0/24
