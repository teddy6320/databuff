---
apiVersion: v1
kind: Service
metadata:
  name: ai-apm-web
  namespace: databuff
  labels:
    app.kubernetes.io/name: ai-apm
    app.kubernetes.io/component: web
spec:
  type: NodePort
  selector:
    app.kubernetes.io/name: ai-apm
    app.kubernetes.io/component: web
  ports:
    - name: http
      port: 27403
      targetPort: http
      nodePort: 32703
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-apm-web
  namespace: databuff
  labels:
    app.kubernetes.io/name: ai-apm
    app.kubernetes.io/component: web
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: ai-apm
      app.kubernetes.io/component: web
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ai-apm
        app.kubernetes.io/component: web
    spec:
      containers:
        - name: ai-apm-web
          image: __WEB_IMAGE__
          ports:
            - name: http
              containerPort: 27403
          envFrom:
            - configMapRef:
                name: ai-apm-config
          env:
            - name: TZ
              value: Asia/Shanghai
            - name: JAVA_TOOL_OPTIONS
              value: "-Xms512m -Xmx1536m -Duser.timezone=Asia/Shanghai"
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
          resources:
            requests:
              memory: 1Gi
              cpu: 200m
            limits:
              memory: 2Gi
              cpu: "1"
