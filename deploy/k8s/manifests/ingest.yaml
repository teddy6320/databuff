---
apiVersion: v1
kind: Service
metadata:
  name: ai-apm-ingest
  namespace: databuff
  labels:
    app.kubernetes.io/name: ai-apm
    app.kubernetes.io/component: ingest
spec:
  type: NodePort
  selector:
    app.kubernetes.io/name: ai-apm
    app.kubernetes.io/component: ingest
  ports:
    - name: otlp-grpc
      port: 4317
      targetPort: otlp-grpc
      nodePort: 30417
    - name: otlp-http
      port: 4318
      targetPort: otlp-http
      nodePort: 30418
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-apm-ingest
  namespace: databuff
  labels:
    app.kubernetes.io/name: ai-apm
    app.kubernetes.io/component: ingest
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: ai-apm
      app.kubernetes.io/component: ingest
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ai-apm
        app.kubernetes.io/component: ingest
    spec:
      containers:
        - name: ai-apm-ingest
          image: __INGEST_IMAGE__
          ports:
            - name: otlp-grpc
              containerPort: 4317
            - name: otlp-http
              containerPort: 4318
            - name: cluster-grpc
              containerPort: 18112
          envFrom:
            - configMapRef:
                name: ai-apm-config
          env:
            - name: TZ
              value: Asia/Shanghai
            - name: POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
            - name: JAVA_TOOL_OPTIONS
              value: "-Xms1g -Xmx4g -Duser.timezone=Asia/Shanghai"
          livenessProbe:
            httpGet:
              path: /health
              port: otlp-http
            initialDelaySeconds: 30
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /health
              port: otlp-http
            initialDelaySeconds: 15
            periodSeconds: 10
          resources:
            requests:
              memory: 2Gi
              cpu: 500m
            limits:
              memory: 5Gi
              cpu: "2"
