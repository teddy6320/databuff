---
apiVersion: v1
kind: Service
metadata:
  name: ai-apm-zookeeper
  namespace: databuff
  labels:
    app.kubernetes.io/name: ai-apm
    app.kubernetes.io/component: zookeeper
spec:
  clusterIP: None
  selector:
    app.kubernetes.io/name: ai-apm
    app.kubernetes.io/component: zookeeper
  ports:
    - name: client
      port: 2181
      targetPort: client
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: ai-apm-zookeeper
  namespace: databuff
  labels:
    app.kubernetes.io/name: ai-apm
    app.kubernetes.io/component: zookeeper
spec:
  serviceName: ai-apm-zookeeper
  replicas: 1
  podManagementPolicy: OrderedReady
  selector:
    matchLabels:
      app.kubernetes.io/name: ai-apm
      app.kubernetes.io/component: zookeeper
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ai-apm
        app.kubernetes.io/component: zookeeper
    spec:
      containers:
        - name: ai-apm-zookeeper
          image: __ZOOKEEPER_IMAGE__
          ports:
            - name: client
              containerPort: 2181
          env:
            - name: ALLOW_ANONYMOUS_LOGIN
              value: "yes"
            - name: ZOO_PORT_NUMBER
              value: "2181"
          volumeMounts:
            - name: data
              mountPath: /bitnami/zookeeper
          readinessProbe:
            tcpSocket:
              port: client
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: client
            initialDelaySeconds: 30
            periodSeconds: 15
          resources:
            requests:
              memory: 256Mi
              cpu: 100m
            limits:
              memory: 512Mi
              cpu: 500m
      volumes:
        - name: data
          emptyDir: {}
