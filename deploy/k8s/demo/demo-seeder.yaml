apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-apm-demo
  namespace: databuff
  labels:
    app: ai-apm-demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ai-apm-demo
  template:
    metadata:
      labels:
        app: ai-apm-demo
    spec:
      containers:
        - name: ai-apm-demo
          image: __DEMO_IMAGE__
          env:
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: http://ai-apm-ingest:4318
            - name: SEED_INTERVAL_SECONDS
              value: "30"
            - name: TZ
              value: Asia/Shanghai
            - name: JAVA_TOOL_OPTIONS
              value: "-Xms64m -Xmx128m -Duser.timezone=Asia/Shanghai"
          resources:
            requests:
              memory: 128Mi
            limits:
              memory: 256Mi
